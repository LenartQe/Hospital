# MySQL: database is created automatically if it does not exist (see JDBC URL)
spring.datasource.url=jdbc:mysql://localhost:3306/hospital_system?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=

# Hibernate creates/updates tables automatically
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Avoid XAMPP/other Tomcat on 8080–8081; Spring Boot API here.
server.port=8082
spring.application.name=hospital-system

# CORS is configured in Java for the React app (localhost:3000)

# JWT (change secret in production)
app.jwt.secret=HospitalPrizrenSecretKey2026ChangeInProductionMin32Chars
app.jwt.expiration-ms=86400000
